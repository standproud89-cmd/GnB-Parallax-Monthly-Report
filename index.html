<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GnB 성적표 입력 시스템</title>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; }

      @media print {
        @page { size: A4; margin: 8mm; }
        html, body { margin: 0 !important; padding: 0 !important; background: #fff !important; }
        * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }

        .print-hide { display: none !important; }

        #root, .app-shell, .step3-wrapper {
          max-width: none !important;
          width: 100% !important;
          margin: 0 !important;
          padding: 0 !important;
          min-height: 0 !important;
          background: #fff !important;
        }

        .report-card {
          box-shadow: none !important;
          border-radius: 0 !important;
          border: 1px solid #e5e7eb !important;
        }
        .report-header { padding: 6px 14px 3px !important; }
        .report-section { margin: 6px 14px 0 !important; }
        .report-section:last-child { margin-bottom: 6px !important; }
        .info-row { margin: 4px 24px 0 !important; }
        .info-row > div { padding: 4px 12px !important; font-size: 10.5px !important; }
        .section-header { padding-bottom: 3px !important; }
        .section-header span:last-child { font-size: 12.5px !important; }
        .textbook-banner { padding: 5px 14px !important; font-size: 11.5px !important; }
        .report-footer { margin: 4px 24px 4px !important; padding-top: 4px !important; font-size: 9.5px !important; }

        .score-table td, .score-table th { padding: 2px 6px !important; font-size: 9.5px !important; }
        .perf-table td, .perf-table th { padding: 3px 6px !important; font-size: 9.5px !important; }
        .grade-badge { font-size: 9px !important; width: 76px !important; padding: 2px 0 !important; }

        .chart-box, .radar-box { height: 165px !important; padding: 4px !important; }

        .comments-box {
          height: 30mm !important;
          min-height: 0 !important;
          max-height: 30mm !important;
          padding: 5px 10px !important;
          font-size: 10.5px !important;
          line-height: 1.45 !important;
          overflow: hidden !important;
        }

        .print-page { page-break-after: always; }
        .print-page:last-child { page-break-after: auto; }
      }

      /* PDF 다운로드용 캡처 모드 - @media print과 동일한 수치를 고정 픽셀 폭으로 재현 (A4 794x1123px 기준, 안전 영역 약 730x1050px) */
      .pdf-capture-mode .report-card {
        width: 733px !important;
        margin: 0 auto !important;
        box-shadow: none !important;
        border-radius: 0 !important;
        border: 1px solid #e5e7eb !important;
      }
      .pdf-capture-mode .report-header { padding: 6px 14px 3px !important; }
      .pdf-capture-mode .report-section { margin: 6px 14px 0 !important; }
      .pdf-capture-mode .report-section:last-child { margin-bottom: 6px !important; }
      .pdf-capture-mode .info-row { margin: 4px 24px 0 !important; }
      .pdf-capture-mode .info-row > div { padding: 4px 12px !important; font-size: 10.5px !important; }
      .pdf-capture-mode .section-header { padding-bottom: 3px !important; }
      .pdf-capture-mode .section-header span:last-child { font-size: 12.5px !important; }
      .pdf-capture-mode .textbook-banner { padding: 5px 14px !important; font-size: 11.5px !important; }
      .pdf-capture-mode .report-footer { margin: 4px 24px 4px !important; padding-top: 4px !important; font-size: 9.5px !important; }
      .pdf-capture-mode .score-table td, .pdf-capture-mode .score-table th { padding: 2px 6px !important; font-size: 9.5px !important; }
      .pdf-capture-mode .perf-table td, .pdf-capture-mode .perf-table th { padding: 3px 6px !important; font-size: 9.5px !important; }
      .pdf-capture-mode .grade-badge { font-size: 9px !important; width: 76px !important; padding: 2px 0 !important; }
      .pdf-capture-mode .chart-box, .pdf-capture-mode .radar-box { height: 165px !important; padding: 4px !important; }
      .pdf-capture-mode .comments-box {
        height: 30mm !important;
        min-height: 0 !important;
        max-height: 30mm !important;
        padding: 5px 10px !important;
        font-size: 10.5px !important;
        line-height: 1.45 !important;
        overflow: hidden !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
